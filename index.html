<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EstágioCare</title>

  <!-- Favicon inline -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🩺</text></svg>" />

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />

  <style>
    /* Loading screen while Babel compiles */
    body { margin: 0; background: #F2F2F7; font-family: -apple-system, 'Inter', sans-serif; }
    #loading {
      position: fixed; inset: 0; background: #F2F2F7;
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px;
      z-index: 9999;
    }
    #loading .logo {
      width: 60px; height: 60px; border-radius: 18px; background: #007AFF;
      display: flex; align-items: center; justify-content: center;
    }
    #loading .logo svg { width: 28px; height: 28px; }
    #loading p { font-size: 14px; color: #8E8E93; margin: 0; }
    #loading .spinner {
      width: 24px; height: 24px; border: 2px solid #E5E5EA;
      border-top-color: #007AFF; border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <!-- Loading indicator (hidden once React mounts) -->
  <div id="loading">
    <div class="logo">
      <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M22 12h-4l-3 9L9 3l-3 9H2"/>
      </svg>
    </div>
    <div class="spinner"></div>
    <p>A carregar EstágioCare…</p>
  </div>

  <!-- React root -->
  <div id="root"></div>

  <!-- ── CDN: React 18 + ReactDOM ── -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  <!-- ── CDN: Babel Standalone (transpiles JSX in the browser) ── -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- ── App (loaded as Babel/JSX) ── -->
  <script type="text/babel" src="app.js" data-presets="react"></script>

  <!-- Hide loading screen once React has mounted -->
  <script>
    // Poll until #root has children, then hide the loader
    const _hideLoader = setInterval(() => {
      if (document.getElementById('root').children.length > 0) {
        const el = document.getElementById('loading');
        if (el) { el.style.opacity = '0'; el.style.transition = 'opacity .3s'; setTimeout(() => el.remove(), 300); }
        clearInterval(_hideLoader);
      }
    }, 100);
  </script>

</body>
</html>
